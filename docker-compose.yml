x-api: &api
  build: .
  expose:
    - "8080"
  deploy:
    resources:
      limits:
        cpus: "0.4"
        memory: "160M"

services:
  api1:
    <<: *api
    restart: on-failure

  api2:
    <<: *api
    restart: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30M"
    restart: unless-stopped