x-api: &api
  build: .
  environment:
    - ASPNETCORE_URLS=http://0.0.0
  deploy:
    resources:
      limits:
        cpus: "0.4"
        memory: "140M"

services:
  api1:
    <<: *api

  api2:
    <<: *api

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30M"
    restart: unless-stopped
